# herdr configuration

[keys]
prefix = "alt+j"
previous_workspace = "prefix+alt+h"
next_workspace = "prefix+alt+l"

[[keys.command]]
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"

# blocked (ユーザー対応待ち) のエージェントへフォーカス。複数あれば押すたびに巡回する
[[keys.command]]
key = "prefix+a"
type = "shell"
command = '''t=$(herdr agent list | jq -r '.result.agents as $a | [$a[] | select(.agent_status == "blocked").terminal_id] as $b | [$a[] | select(.focused).terminal_id][0] as $f | if $b == [] then empty else $b[((($b | index($f)) // -1) + 1) % ($b | length)] end'); [ -n "$t" ] && herdr agent focus "$t"'''

[ui]
prompt_new_tab_name = false
